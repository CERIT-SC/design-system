name: Build and Publish Package to npmjs

on:
  push:
    branches: [main]
    tags: ["v*"] # Trigger on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for checkout
      id-token: write # for authentication with npm
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          registries: |
            https://registry.npmjs.org/|${{ secrets.NPMJS_TOKEN }}

      - name: Install dependencies
        run: bun ci

      - name: Publish
        run: bun publish --provenance --access public
