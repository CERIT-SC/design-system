services:
  app:
    build:
      context: ../../../
      dockerfile: ./deployment/containers/prod/Dockerfile.bun
    image: design-system-showcase:latest
    pull_policy: build
    container_name: designsystem-app
    restart: unless-stopped
    networks:
      - designsystem-app-external
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

networks:
  designsystem-app-external:
    driver: bridge
