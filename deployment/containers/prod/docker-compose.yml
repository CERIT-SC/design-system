services:
  app:
    build:
      context: ../../../
      dockerfile: ./deployment/containers/prod/Dockerfile.app.bun
    image: designsystem-app:latest
    pull_policy: build
    container_name: designsystem-app
    restart: unless-stopped
    networks:
      - designsystem-app-external
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  storybook:
    build:
      context: ../../../
      dockerfile: ./deployment/containers/prod/Dockerfile.storybook.bun
    image: designsystem-storybook:latest
    pull_policy: build
    container_name: designsystem-storybook
    restart: unless-stopped
    networks:
      - designsystem-app-external
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

networks:
  designsystem-app-external:
    driver: bridge
