apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-storybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-storybook
  template:
    metadata:
      labels:
        app: prod-storybook
    spec:
      imagePullSecrets:
        - name: cerit-io-harbor-accesstoken
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prod-storybook
          image: cerit.io/design-system/storybook:prod
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: probe-port
              containerPort: 8080
          resources:
            limits:
              memory: "1Gi"
              cpu: "0.5"
            requests:
              memory: "512Mi"
              cpu: "0.25"
